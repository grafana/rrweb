name: Release

on:
  push:
    branches:
      - master

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: master

  test:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version-file: .nvmrc

      - name: Upgrade npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install browsers
        run: |
          for install in $(find . -path '*/puppeteer/install.js' -not -path '*/puppeteer/node_modules/*'); do
            echo "Running $install"
            node "$install"
          done
          npx playwright install --with-deps chromium

      - name: Build
        run: npm run build:all

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check-types

      - name: Unit tests
        run: npm test
        env:
          PUPPETEER_HEADLESS: 'true'

  publish:
    permissions:
      contents: read
      id-token: write

    runs-on: ubuntu-latest
    needs: [release-please, test]
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    environment: publish

    env:
      NPM_CONFIG_ACCESS: public
      NPM_CONFIG_PROVENANCE: true

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build:all

      - name: Get secrets from Vault
        id: get-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@a53fc80bc30b0a16a262520465db899fa3af08b7 # get-vault-secrets/v1.3.2
        with:
          repo_secrets: |
            NPM_TOKEN=npm-publishing:token

      - name: Publish packages to npm
        run: |
          publish_pkg() {
            local pkg="$1"
            local name version
            name=$(node -e "process.stdout.write(require('./$pkg/package.json').name)")
            version=$(node -e "process.stdout.write(require('./$pkg/package.json').version)")

            if npm view "$name@$version" version 2>/dev/null | grep -q "$version"; then
              echo "Skipping $name@$version — already published"
              return 0
            fi

            echo "Publishing $name@$version..."
            (cd "$pkg" && npm publish --provenance --access public)
          }

          failed=0
          for pkg in packages/*/ packages/plugins/*/; do
            if [ -f "$pkg/package.json" ] && node -e "const p=require('./$pkg/package.json'); process.exit(p.private ? 1 : 0)" 2>/dev/null; then
              publish_pkg "$pkg" || failed=1
            fi
          done
          exit $failed
        env:
          NODE_AUTH_TOKEN: ${{ fromJSON(steps.get-secrets.outputs.secrets).NPM_TOKEN }}
